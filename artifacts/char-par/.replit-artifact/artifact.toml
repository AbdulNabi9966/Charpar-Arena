kind = "web"
previewPath = "/"
title = "Char Par"
version = "1.0.0"
id = "artifacts/char-par"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22495

[services.development]
run = "pnpm --filter @workspace/char-par run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/char-par", "run", "build" ]
publicDir = "artifacts/char-par/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22495"
BASE_PATH = "/"
