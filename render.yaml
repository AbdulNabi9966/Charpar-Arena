services:
  - type: web
    name: charpar-backend
    runtime: node
    plan: free
    rootDir: artifacts/api-server
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      # Go to project root (2 levels up from api-server)
      cd ../..
      pnpm install --frozen-lockfile
      # Run migration from root (which will use the db package)
      pnpm run db:migrate
      # Go back to api-server and build
      cd artifacts/api-server
      pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        value: https://charpar-frontend.vercel.app
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
