services:
  - type: web
    name: charpar-backend
    runtime: node
    plan: free
    rootDir: artifacts/api-server
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm run render-build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        value: https://charpar.vercel.app
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
